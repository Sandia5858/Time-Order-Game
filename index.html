<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Order Game</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg,#fff1c1,#ffd6e8,#c7f0ff);
}
.card {
  margin:10px;
  padding:15px;
  background:#ffb6c1;
  border-radius:15px;
  cursor:pointer;
  display:inline-block;
}
</style>
</head>
<body>

<h2>Time Order Game</h2>

Class: <input id="className"><br><br>
Name: <input id="studentName"><br><br>

<div id="cards"></div>

<button onclick="check()">Check Answers</button>

<script>
const words = ["two days ago","yesterday morning","last night","two hours ago","an hour ago","today (now)"];
let selected = [];

function render(){
  document.getElementById("cards").innerHTML = "";
  words.forEach(function(w){
    if(!selected.includes(w)){
      let div=document.createElement("div");
      div.className="card";
      div.innerText=w;
      div.onclick=function(){ select(w); };
      document.getElementById("cards").appendChild(div);
    }
  });
}

function select(w){
  selected.push(w);
  render();
}

function check(){
  let correct = ["two days ago","yesterday morning","last night","two hours ago","an hour ago","today (now)"];
  let score=0;
  for(let i=0;i<correct.length;i++){
    if(selected[i]==correct[i]) score++;
  }

  alert("Score: "+score+"/6");

  let img = new Image();
  img.src = "https://script.google.com/macros/s/AKfycbzH_qqqrpi9ew7d4HpoQ_yfaOn7H-pk78XD98hc56_0nQbV6hBFV3kC86MVnqMIUyWT/exec?className="+document.getElementById("className").value+
            "&studentName="+document.getElementById("studentName").value+
            "&score="+score+"/6"+
            "&submittedAt="+new Date();
}

render();
</script>

</body>
</html>
