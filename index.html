<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Order Game: Time Expressions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 1.05em;
        }

        .input-group input {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .game-section {
            display: none;
        }

        .game-section.active {
            display: block;
        }

        .instructions {
            background: #f0f4ff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }

        .instructions p {
            color: #333;
            line-height: 1.6;
            font-size: 1.05em;
        }

        .cards-container {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 30px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
            border: 2px dashed #ddd;
        }

        .card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            font-size: 1.2em;
            font-weight: 500;
            cursor: grab;
            user-select: none;
            touch-action: none;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .card:active {
            cursor: grabbing;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.5);
        }

        .card.dragging {
            opacity: 0.7;
        }

        .ordered-list {
            background: white;
            border-radius: 10px;
            padding: 20px;
            min-height: 300px;
            border: 2px solid #ddd;
            margin-bottom: 30px;
        }

        .ordered-item {
            display: flex;
            align-items: center;
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 2px dashed #ddd;
            min-height: 60px;
            justify-content: center;
            font-size: 1.1em;
            color: #666;
        }

        .ordered-item.filled {
            background: #e8f0ff;
            border: 2px solid #667eea;
            color: #333;
            font-weight: 500;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: 1 / -1;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-start:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-submit {
            background: #4caf50;
            color: white;
        }

        .btn-submit:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }

        .btn-reset {
            background: #ff9800;
            color: white;
        }

        .btn-reset:hover {
            background: #e68900;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);
        }

        .results {
            display: none;
            text-align: center;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 40px;
            border-radius: 15px;
            color: white;
        }

        .results.show {
            display: block;
        }

        .results h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .score-display {
            font-size: 3em;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .results-table {
            background: white;
            color: #333;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .result-row {
            display: grid;
            grid-template-columns: 1fr 2fr 2fr;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid #ddd;
            align-items: center;
        }

        .result-row.header {
            font-weight: 600;
            background: #f0f0f0;
            border-bottom: 2px solid #ddd;
        }

        .result-row:last-child {
            border-bottom: none;
        }

        .check-mark {
            font-size: 2em;
        }

        .check-mark.correct {
            color: #4caf50;
        }

        .check-mark.incorrect {
            color: #f44336;
        }

        .btn-restart {
            background: white;
            color: #f5576c;
            margin-top: 20px;
            font-weight: 700;
        }

        .btn-restart:hover {
            background: #f9f9f9;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .input-section {
                grid-template-columns: 1fr;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .result-row {
                grid-template-columns: auto 1fr 1fr;
                font-size: 0.95em;
            }
        }

        .user-info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1.05em;
            text-align: center;
            color: #1976d2;
            font-weight: 500;
        }

        .feedback {
            text-align: center;
            font-size: 1.2em;
            font-weight: 600;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.perfect {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .feedback.good {
            background: #fff9c4;
            color: #f57f17;
        }

        .feedback.needs-work {
            background: #ffccbc;
            color: #d84315;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>⏰ Time Order Game</h1>
            <p>Time Expressions</p>
        </div>

        <!-- Input Section -->
        <div class="input-section" id="inputSection">
            <div class="input-group">
                <label for="className">Class / 班級:</label>
                <input type="text" id="className" placeholder="e.g., 2A, 3B" />
            </div>
            <div class="input-group">
                <label for="studentName">English Name / 英文名字:</label>
                <input type="text" id="studentName" placeholder="e.g., John, Emily" />
            </div>
        </div>

        <button class="btn-start" id="startBtn" onclick="startGame()">Start Game / 開始遊戲</button>

        <!-- Game Section -->
        <div class="game-section" id="gameSection">
            <div class="user-info" id="userInfo"></div>

            <div class="instructions">
                <p>📝 <strong>Instructions:</strong> Drag the time expressions below to arrange them in chronological order (earliest to latest). Then click "Submit Answer".</p>
                <p>📝 <strong>說明：</strong>將下方的時間表達式拖曳排序，按照發生先後順序（最早到最晚）排列。然後點擊「提交答案」。</p>
            </div>

            <p style="margin-bottom: 15px; color: #666;"><strong>Available Cards / 可用卡片:</strong></p>
            <div class="cards-container" id="cardsContainer"></div>

            <p style="margin-bottom: 15px; color: #666;"><strong>Your Order / 你的排序:</strong></p>
            <div class="ordered-list" id="orderedList"></div>

            <div class="feedback" id="feedback"></div>

            <div class="button-group">
                <button class="btn-submit" onclick="submitAnswer()">Submit Answer / 提交答案</button>
                <button class="btn-reset" onclick="resetGame()">Reset / 重新開始</button>
            </div>
        </div>

        <!-- Results Section -->
        <div class="results" id="results">
            <h2 id="resultTitle">Results / 結果</h2>
            <div class="score-display" id="scoreDisplay"></div>
            <div class="results-table" id="resultsTable"></div>
            <button class="btn-restart" onclick="restartGame()">Play Again / 再玩一次</button>
        </div>
    </div>

    <script>
        const timeExpressions = [
            'two days ago',
            'last night',
            'yesterday morning',
            'two hours ago',
            'an hour ago',
            'today (now)'
        ];

        const correctOrder = [
            'two days ago',
            'yesterday morning',
            'last night',
            'two hours ago',
            'an hour ago',
            'today (now)'
        ];

        let currentOrder = [];
        let shuffledCards = [];

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function startGame() {
            const className = document.getElementById('className').value.trim();
            const studentName = document.getElementById('studentName').value.trim();

            if (!className || !studentName) {
                alert('Please enter both Class and English Name / 請輸入班級和英文名字');
                return;
            }

            // Hide input section and show game
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('gameSection').classList.add('active');

            // Display user info
            document.getElementById('userInfo').textContent = `👤 Class: ${className} | Name: ${studentName}`;

            // Initialize game
            shuffledCards = shuffleArray(timeExpressions);
            currentOrder = [];
            renderCards();
            renderOrderedList();
            document.getElementById('results').classList.remove('show');
            document.getElementById('feedback').classList.remove('show');
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            shuffledCards.forEach((expression, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.textContent = expression;
                card.draggable = true;
                card.id = `card-${index}`;

                card.addEventListener('dragstart', (e) => {
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/plain', expression);
                    card.classList.add('dragging');
                });

                card.addEventListener('dragend', () => {
                    card.classList.remove('dragging');
                });

                container.appendChild(card);
            });
        }

        function renderOrderedList() {
            const list = document.getElementById('orderedList');
            list.innerHTML = '';

            for (let i = 0; i < 6; i++) {
                const item = document.createElement('div');
                item.className = 'ordered-item';
                item.id = `slot-${i}`;

                if (currentOrder[i]) {
                    item.textContent = currentOrder[i];
                    item.classList.add('filled');
                } else {
                    item.textContent = `${i + 1}. Drop here`;
                    item.style.opacity = '0.5';
                }

                item.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    item.style.backgroundColor = '#cce5ff';
                });

                item.addEventListener('dragleave', () => {
                    item.style.backgroundColor = '';
                });

                item.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const expression = e.dataTransfer.getData('text/plain');
                    
                    // Remove from current order if already there
                    currentOrder = currentOrder.filter(exp => exp !== expression);
                    
                    // Insert at this position
                    currentOrder.splice(i, 0, expression);
                    
                    renderOrderedList();
                    item.style.backgroundColor = '';
                });

                list.appendChild(item);
            }
        }

        function submitAnswer() {
            if (currentOrder.length !== 6) {
                alert('Please arrange all 6 time expressions / 請排列所有6個時間表達式');
                return;
            }

            // Check answers
            let correct = 0;
            const results = [];

            for (let i = 0; i < 6; i++) {
                const isCorrect = currentOrder[i] === correctOrder[i];
                if (isCorrect) correct++;

                results.push({
                    position: i + 1,
                    your_answer: currentOrder[i],
                    correct_answer: correctOrder[i],
                    is_correct: isCorrect
                });
            }

            // Show feedback
            const percentage = Math.round((correct / 6) * 100);
            const feedback = document.getElementById('feedback');
            feedback.classList.add('show');

            if (correct === 6) {
                feedback.classList.remove('good', 'needs-work');
                feedback.classList.add('perfect');
                feedback.textContent = '🎉 Perfect! All correct! / 完美！全部正確！';
            } else if (correct >= 4) {
                feedback.classList.remove('perfect', 'needs-work');
                feedback.classList.add('good');
                feedback.textContent = `⭐ Good! ${correct}/6 correct / 不錯！${correct}/6 正確`;
            } else {
                feedback.classList.remove('perfect', 'good');
                feedback.classList.add('needs-work');
                feedback.textContent = `💪 Keep trying! ${correct}/6 correct / 加油！${correct}/6 正確`;
            }

            // Show results
            setTimeout(() => {
                showResults(results, correct, percentage);
            }, 500);
        }

        function showResults(results, correct, percentage) {
            document.getElementById('gameSection').classList.remove('active');
            document.getElementById('results').classList.add('show');

            const score = `${correct}/6 (${percentage}%)`;
            document.getElementById('scoreDisplay').textContent = score;

            let resultsHTML = `
                <div class="result-row header">
                    <div>#</div>
                    <div>Your Answer</div>
                    <div>Correct Answer</div>
                </div>
            `;

            results.forEach(result => {
                const checkMark = result.is_correct ? '✓' : '✗';
                const checkClass = result.is_correct ? 'correct' : 'incorrect';
                resultsHTML += `
                    <div class="result-row">
                        <div class="check-mark ${checkClass}">${checkMark}</div>
                        <div>${result.your_answer}</div>
                        <div><strong>${result.correct_answer}</strong></div>
                    </div>
                `;
            });

            document.getElementById('resultsTable').innerHTML = resultsHTML;
        }

        function resetGame() {
            currentOrder = [];
            renderCards();
            renderOrderedList();
            document.getElementById('feedback').classList.remove('show');
        }

        function restartGame() {
            // Reset all
            document.getElementById('className').value = '';
            document.getElementById('studentName').value = '';
            document.getElementById('inputSection').style.display = 'grid';
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('gameSection').classList.remove('active');
            document.getElementById('results').classList.remove('show');
            currentOrder = [];
        }

        // Enable touch support for mobile
        document.addEventListener('touchstart', () => {}, false);
    </script>
</body>
</html>
