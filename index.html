<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Order Game: Time Expressions</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,.75) 0 22px, transparent 23px),
        radial-gradient(circle at 85% 12%, rgba(255,255,255,.65) 0 30px, transparent 31px),
        radial-gradient(circle at 18% 86%, rgba(255,255,255,.65) 0 24px, transparent 25px),
        linear-gradient(135deg, #fff1c1 0%, #ffd6e8 52%, #c7f0ff 100%);
    }

    body::before {
      content: "⭐ ☁️ 🌈 ⏰ ⭐ ☁️ 🌈 ⏰";
      position: fixed;
      top: 16px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 28px;
      opacity: .55;
      letter-spacing: 16px;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 920px;
      background: rgba(255,255,255,.96);
      border-radius: 28px;
      padding: 34px;
      box-shadow: 0 14px 36px rgba(0,0,0,.16);
      border: 6px solid rgba(255,255,255,.78);
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      margin-bottom: 26px;
    }

    .header h1 {
      color: #5b6ee1;
      font-size: 2.25em;
      margin-bottom: 8px;
    }

    .header p {
      color: #555;
      font-size: 1.18em;
      font-weight: 700;
    }

    .input-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 20px;
    }

    .input-group {
      text-align: left;
    }

    .input-group label {
      display: block;
      font-weight: 800;
      color: #333;
      margin-bottom: 8px;
      font-size: 1.05em;
    }

    .input-group input {
      width: 100%;
      padding: 14px;
      border: 3px solid #d8dcff;
      border-radius: 16px;
      font-size: 1.05em;
      background: #fbfcff;
    }

    .input-group input:focus {
      outline: none;
      border-color: #7c8cff;
      box-shadow: 0 0 0 4px rgba(124,140,255,.16);
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 15px 24px;
      font-size: 1.08em;
      font-weight: 900;
      cursor: pointer;
      transition: .22s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .btn-start {
      width: 100%;
      color: white;
      background: linear-gradient(135deg, #6f7cff 0%, #a66cff 100%);
      box-shadow: 0 8px 18px rgba(111,124,255,.28);
    }

    .btn-submit {
      color: white;
      background: #49b86f;
      box-shadow: 0 8px 18px rgba(73,184,111,.25);
    }

    .btn-reset {
      color: white;
      background: #ff9e43;
      box-shadow: 0 8px 18px rgba(255,158,67,.25);
    }

    .btn-restart {
      background: white;
      color: #f05f9a;
      box-shadow: 0 8px 18px rgba(255,255,255,.2);
    }

    .game-section, .results {
      display: none;
    }

    .game-section.active, .results.show {
      display: block;
    }

    .user-info {
      background: #e6f7ff;
      border: 2px solid #b8e7ff;
      padding: 15px;
      border-radius: 16px;
      margin-bottom: 18px;
      text-align: center;
      color: #1976d2;
      font-size: 1.08em;
      font-weight: 800;
    }

    .instructions {
      background: #fff9d8;
      border-left: 8px solid #ffbd59;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 22px;
      line-height: 1.55;
      color: #3c3c3c;
      font-size: 1.03em;
    }

    .section-title {
      margin: 16px 0 10px;
      color: #444;
      font-weight: 900;
      font-size: 1.08em;
    }

    .cards-container {
      background: #fff7fb;
      border: 3px dashed #ffb6d5;
      border-radius: 20px;
      padding: 22px;
      min-height: 118px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .card {
      background: linear-gradient(135deg, #ffb6d5 0%, #ffd36e 100%);
      color: #343434;
      padding: 18px 14px;
      border-radius: 22px;
      text-align: center;
      font-size: 1.18em;
      font-weight: 900;
      cursor: pointer;
      user-select: none;
      border: 3px solid #fff;
      box-shadow: 0 6px 14px rgba(255,138,178,.32);
      transition: .16s;
    }

    .card:hover {
      transform: translateY(-3px) scale(1.01);
    }

    .card.selected {
      opacity: .38;
      pointer-events: none;
      transform: scale(.97);
    }

    .small-tip {
      text-align: center;
      color: #666;
      font-size: .95em;
      margin-bottom: 12px;
    }

    .ordered-list {
      background: #f7fbff;
      border: 3px solid #b8e7ff;
      border-radius: 20px;
      padding: 18px;
      min-height: 340px;
      margin-bottom: 18px;
    }

    .ordered-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: white;
      border: 2px dashed #cfd8dc;
      border-radius: 16px;
      min-height: 58px;
      padding: 15px;
      margin-bottom: 10px;
      color: #777;
      font-size: 1.06em;
    }

    .ordered-item.filled {
      background: #e9f0ff;
      border: 2px solid #7c8cff;
      color: #333;
      font-weight: 900;
      cursor: pointer;
    }

    .ordered-number {
      background: #7c8cff;
      color: white;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      margin-right: 10px;
      font-weight: 900;
      flex-shrink: 0;
    }

    .ordered-text {
      flex: 1;
    }

    .remove-note {
      color: #777;
      font-size: .85em;
      font-weight: 700;
      margin-left: 12px;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .feedback {
      display: none;
      text-align: center;
      font-size: 1.18em;
      font-weight: 900;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 18px;
    }

    .feedback.show {
      display: block;
    }

    .feedback.perfect {
      background: #d8f7d8;
      color: #2e7d32;
    }

    .feedback.good {
      background: #fff4bf;
      color: #b46a00;
    }

    .feedback.needs-work {
      background: #ffd9cf;
      color: #c74420;
    }

    .results {
      text-align: center;
      color: white;
      background: linear-gradient(135deg, #ff9acb 0%, #8ed8ff 100%);
      padding: 34px;
      border-radius: 24px;
      border: 4px solid white;
    }

    .results h2 {
      font-size: 2.2em;
      margin-bottom: 14px;
      text-shadow: 0 2px 5px rgba(0,0,0,.18);
    }

    .score-display {
      font-size: 2.8em;
      font-weight: 900;
      margin: 16px 0;
      text-shadow: 0 2px 5px rgba(0,0,0,.2);
    }

    .results-table {
      background: white;
      color: #333;
      border-radius: 18px;
      padding: 16px;
      margin: 20px 0;
      text-align: left;
      overflow-x: auto;
    }

    .result-row {
      display: grid;
      grid-template-columns: 70px 1fr 1fr;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid #eee;
      align-items: center;
      font-size: 1em;
    }

    .result-row.header {
      font-weight: 900;
      background: #f5f7ff;
      border-radius: 12px;
      border-bottom: none;
      color: #444;
    }

    .check-mark {
      font-size: 1.8em;
      text-align: center;
      font-weight: 900;
    }

    .check-mark.correct {
      color: #35a853;
    }

    .check-mark.incorrect {
      color: #e53935;
    }

    @media (max-width: 768px) {
      body {
        padding: 12px;
        align-items: flex-start;
      }

      body::before {
        font-size: 20px;
        letter-spacing: 8px;
      }

      .container {
        padding: 20px;
        border-radius: 22px;
      }

      .header h1 {
        font-size: 1.65em;
      }

      .input-section, .cards-container, .button-group {
        grid-template-columns: 1fr;
      }

      .result-row {
        grid-template-columns: 50px 1fr 1fr;
        gap: 8px;
        font-size: .88em;
        padding: 10px 6px;
      }

      .score-display {
        font-size: 2.2em;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>⏰ Time Order Game</h1>
      <p>Time Expressions</p>
    </div>

    <div class="input-section" id="inputSection">
      <div class="input-group">
        <label for="className">Class / 班級</label>
        <input type="text" id="className" placeholder="e.g., 501" />
      </div>
      <div class="input-group">
        <label for="studentName">English Name / 英文名字</label>
        <input type="text" id="studentName" placeholder="e.g., Willie" />
      </div>
    </div>

    <button class="btn-start" id="startBtn" onclick="startGame()">Start Game / 開始遊戲</button>

    <div class="game-section" id="gameSection">
      <div class="user-info" id="userInfo"></div>

      <div class="instructions">
        <p>📝 <strong>Instructions:</strong> Click the time expressions in chronological order, from earliest to latest.</p>
        <p>📝 <strong>說明：</strong>請依照發生先後順序，從「最早」到「現在」，點選時間單字並完成排序。</p>
      </div>

      <p class="section-title">Available Words / 可選單字</p>
      <div class="cards-container" id="cardsContainer"></div>

      <p class="section-title">Your Order / 你的排序</p>
      <p class="small-tip">點錯了嗎？Click a selected answer below to remove it. / 點下方已選答案可以取消。</p>
      <div class="ordered-list" id="orderedList"></div>

      <div class="feedback" id="feedback"></div>

      <div class="button-group">
        <button class="btn-submit" onclick="submitAnswer()">Check Answers / 對答案</button>
        <button class="btn-reset" onclick="resetGame()">Reset / 重新開始</button>
      </div>
    </div>

    <div class="results" id="results">
      <h2>Results / 結果</h2>
      <div class="score-display" id="scoreDisplay"></div>
      <div class="results-table" id="resultsTable"></div>
      <button class="btn-restart" onclick="restartGame()">Play Again / 再玩一次</button>
    </div>
  </div>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzH_qqqrpi9ew7d4HpoQ_yfaOn7H-pk78XD98hc56_0nQbV6hBFV3kC86MVnqMIUyWT/exec";

    const timeExpressions = [
      "two days ago",
      "last night",
      "yesterday morning",
      "two hours ago",
      "an hour ago",
      "today (now)"
    ];

    const correctOrder = [
      "two days ago",
      "yesterday morning",
      "last night",
      "two hours ago",
      "an hour ago",
      "today (now)"
    ];

    let currentOrder = [];
    let shuffledCards = [];
    let audioContext;

    function playPerfectSound() {
      try {
        audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
        const notes = [523.25, 659.25, 783.99, 1046.5, 1318.51];

        notes.forEach((frequency, index) => {
          const oscillator = audioContext.createOscillator();
          const gain = audioContext.createGain();

          oscillator.type = "triangle";
          oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime + index * 0.11);

          gain.gain.setValueAtTime(0.0001, audioContext.currentTime + index * 0.11);
          gain.gain.exponentialRampToValueAtTime(0.42, audioContext.currentTime + index * 0.11 + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + index * 0.11 + 0.24);

          oscillator.connect(gain);
          gain.connect(audioContext.destination);

          oscillator.start(audioContext.currentTime + index * 0.11);
          oscillator.stop(audioContext.currentTime + index * 0.11 + 0.26);
        });
      } catch (error) {
        console.log("Audio could not be played:", error);
      }
    }

    function playWrongSound() {
      try {
        audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
        const notes = [220, 164.81];

        notes.forEach((frequency, index) => {
          const oscillator = audioContext.createOscillator();
          const gain = audioContext.createGain();

          oscillator.type = "sawtooth";
          oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime + index * 0.18);

          gain.gain.setValueAtTime(0.0001, audioContext.currentTime + index * 0.18);
          gain.gain.exponentialRampToValueAtTime(0.22, audioContext.currentTime + index * 0.18 + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + index * 0.18 + 0.22);

          oscillator.connect(gain);
          gain.connect(audioContext.destination);

          oscillator.start(audioContext.currentTime + index * 0.18);
          oscillator.stop(audioContext.currentTime + index * 0.18 + 0.24);
        });
      } catch (error) {
        console.log("Audio could not be played:", error);
      }
    }

    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function startGame() {
      const className = document.getElementById("className").value.trim();
      const studentName = document.getElementById("studentName").value.trim();

      if (!className || !studentName) {
        alert("Please enter both Class and English Name. / 請輸入班級和英文名字。");
        return;
      }

      document.getElementById("inputSection").style.display = "none";
      document.getElementById("startBtn").style.display = "none";
      document.getElementById("gameSection").classList.add("active");
      document.getElementById("results").classList.remove("show");

      document.getElementById("userInfo").textContent =
        `👤 Class: ${className} | Name: ${studentName}`;

      shuffledCards = shuffleArray(timeExpressions);
      currentOrder = [];

      renderCards();
      renderOrderedList();
      hideFeedback();
    }

    function renderCards() {
      const container = document.getElementById("cardsContainer");
      container.innerHTML = "";

      shuffledCards.forEach((expression) => {
        const card = document.createElement("div");
        card.className = "card";
        card.textContent = expression;

        if (currentOrder.includes(expression)) {
          card.classList.add("selected");
          card.textContent = `✓ ${expression}`;
        }

        card.addEventListener("click", () => {
          if (currentOrder.includes(expression)) return;

          if (currentOrder.length >= correctOrder.length) {
            alert("You have already selected all 6 time expressions. / 你已經選完6個時間單字。");
            return;
          }

          currentOrder.push(expression);
          renderCards();
          renderOrderedList();
        });

        container.appendChild(card);
      });
    }

    function renderOrderedList() {
      const list = document.getElementById("orderedList");
      list.innerHTML = "";

      for (let i = 0; i < correctOrder.length; i++) {
        const item = document.createElement("div");
        item.className = "ordered-item";

        const number = document.createElement("span");
        number.className = "ordered-number";
        number.textContent = i + 1;

        const text = document.createElement("span");
        text.className = "ordered-text";

        const note = document.createElement("span");
        note.className = "remove-note";

        if (currentOrder[i]) {
          item.classList.add("filled");
          text.textContent = currentOrder[i];
          note.textContent = "click to remove";

          item.addEventListener("click", () => {
            currentOrder.splice(i, 1);
            renderCards();
            renderOrderedList();
            hideFeedback();
          });
        } else {
          text.textContent = "Please choose a word.";
        }

        item.appendChild(number);
        item.appendChild(text);
        item.appendChild(note);
        list.appendChild(item);
      }
    }

    function sendResultToGoogleSheet(correct, percentage) {
      const className = document.getElementById("className").value.trim();
      const studentName = document.getElementById("studentName").value.trim();

      const params = new URLSearchParams({
        className: className,
        studentName: studentName,
        score: `${correct}/6`,
        percentage: `${percentage}%`,
        answerOrder: currentOrder.join(" → "),
        submittedAt: new Date().toLocaleString("zh-TW", { timeZone: "Asia/Taipei" })
      });

      const img = new Image();
      img.src = `${GOOGLE_SCRIPT_URL}?${params.toString()}`;
      console.log("Result sent:", img.src);
    }

    function submitAnswer() {
      if (currentOrder.length !== correctOrder.length) {
        alert("Please choose all 6 time expressions. / 請選完所有6個時間單字。");
        return;
      }

      let correct = 0;
      const results = [];

      for (let i = 0; i < correctOrder.length; i++) {
        const isCorrect = currentOrder[i] === correctOrder[i];
        if (isCorrect) correct++;

        results.push({
          yourAnswer: currentOrder[i],
          correctAnswer: correctOrder[i],
          isCorrect
        });
      }

      const percentage = Math.round((correct / correctOrder.length) * 100);

      showFeedback(correct);

      if (correct === correctOrder.length) {
        playPerfectSound();
      } else {
        playWrongSound();
      }

      sendResultToGoogleSheet(correct, percentage);

      setTimeout(() => {
        showResults(results, correct, percentage);
      }, 650);
    }

    function showFeedback(correct) {
      const feedback = document.getElementById("feedback");
      feedback.className = "feedback show";

      if (correct === correctOrder.length) {
        feedback.classList.add("perfect");
        feedback.textContent = "🎉 Perfect! All correct! / 完美！全部正確！";
      } else if (correct >= 4) {
        feedback.classList.add("good");
        feedback.textContent = `⭐ Good! ${correct}/6 correct. / 不錯！${correct}/6 正確。`;
      } else {
        feedback.classList.add("needs-work");
        feedback.textContent = `💪 Keep trying! ${correct}/6 correct. / 加油！${correct}/6 正確。`;
      }
    }

    function hideFeedback() {
      const feedback = document.getElementById("feedback");
      feedback.className = "feedback";
      feedback.textContent = "";
    }

    function showResults(results, correct, percentage) {
      document.getElementById("gameSection").classList.remove("active");
      document.getElementById("results").classList.add("show");

      document.getElementById("scoreDisplay").textContent = `${correct}/6 (${percentage}%)`;

      let resultsHTML = `
        <div class="result-row header">
          <div>#</div>
          <div>Your Answer</div>
          <div>Correct Answer</div>
        </div>
      `;

      results.forEach((result) => {
        const checkMark = result.isCorrect ? "✓" : "✗";
        const checkClass = result.isCorrect ? "correct" : "incorrect";

        resultsHTML += `
          <div class="result-row">
            <div class="check-mark ${checkClass}">${checkMark}</div>
            <div>${result.yourAnswer}</div>
            <div><strong>${result.correctAnswer}</strong></div>
          </div>
        `;
      });

      document.getElementById("resultsTable").innerHTML = resultsHTML;
    }

    function resetGame() {
      currentOrder = [];
      shuffledCards = shuffleArray(timeExpressions);
      renderCards();
      renderOrderedList();
      hideFeedback();
    }

    function restartGame() {
      document.getElementById("className").value = "";
      document.getElementById("studentName").value = "";
      document.getElementById("inputSection").style.display = "grid";
      document.getElementById("startBtn").style.display = "block";
      document.getElementById("gameSection").classList.remove("active");
      document.getElementById("results").classList.remove("show");
      currentOrder = [];
      shuffledCards = [];
      hideFeedback();
    }
  </script>
</body>
</html>
